name: briefing

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 23 * * 6'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install packages
        run: pip install -r requirements.txt

      - name: run briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEETS_ID: ${{ secrets.SHEETS_ID }}
          CALENDAR_ICS: ${{ secrets.CALENDAR_ICS }}
          RUN_TYPE: ${{ github.event_name == 'schedule' && contains(github.event.schedule, '23') && 'weekly' || 'daily' }}
        run: python briefing.py